# Choppy Market Regime — example configuration
# Conservative parameters for sideways markets. Customize to your strategy.
regime_name: "choppy_market"
description: "Choppy/sideways market - conservative parameters"
inherits: "base"

market_regime:
  vix_enabled: true
  vix_extreme_threshold: 35.0
  vix_elevated_threshold: 25.0
  vix_spike_threshold: 0.20

scanner:
  box_threshold: 0.06
  volatility_threshold: 0.025
  volume_increase_ratio: 1.5
  min_dollar_volume: 2000000
  use_breakthrough_filter: false
  use_pullback_confirmation_filter: false
  use_market_cap_filter: false
  ma200_trend_filter:
    enabled: false

  # Trend pattern detector — sector/RS gates disabled in choppy
  use_trend_pattern_detector: true
  trend_pattern_config:
    enabled: true
    min_combined_score: 0.7
    prefer_highest_score: true
    ma_crossover:
      enabled: true
      sma_short_period: 20
      sma_long_period: 50
      crossover_lookback: 3
      volume_mult: 1.5
    sector_regime:
      enabled: false
    relative_strength:
      enabled: false

strategy:
  min_score_threshold: 0.80
  max_new_positions_per_day: 2
  base_position_pct: 0.03
  take_profit_pct: 0.07
  stop_loss_pct: 0.05

risk_gate:
  max_total_exposure: 0.60
