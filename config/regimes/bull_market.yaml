# Bull Market Regime — example configuration
# Aggressive parameters for trending markets. Customize to your strategy.
regime_name: "bull_market"
description: "Bull market - aggressive parameters for trending markets"
inherits: "base"

market_regime:
  vix_enabled: true
  vix_extreme_threshold: 35.0
  vix_elevated_threshold: 25.0
  vix_spike_threshold: 0.20

scanner:
  box_threshold: 0.08
  volatility_threshold: 0.04
  volume_increase_ratio: 1.5
  min_dollar_volume: 500000
  use_pullback_confirmation_filter: false

  # Trend pattern detector
  use_trend_pattern_detector: true
  trend_pattern_config:
    enabled: true
    min_combined_score: 0.6
    prefer_highest_score: true
    ma_crossover:
      enabled: true
      sma_short_period: 20
      sma_long_period: 50
      crossover_lookback: 3
      volume_mult: 1.3
    sector_regime:
      enabled: true
      ema_short_period: 20
      ema_long_period: 50
      min_slope: 0.001
    relative_strength:
      enabled: true
      rs_slope_lookback: 20
      min_rs_slope: 0.0

strategy:
  min_score_threshold: 0.70
  max_new_positions_per_day: 5
  base_position_pct: 0.05
  take_profit_pct: 0.10
  stop_loss_pct: 0.05
  trailing_stop:
    enabled: false

risk_gate:
  max_total_exposure: 1.00

capital_allocation:
  overrides:
    bull_confirmed:
      target_position_pct: 0.06
      max_position_pct: 0.08
